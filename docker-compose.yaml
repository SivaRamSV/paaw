services:
  # =============================================================================
  # PAAW Application
  # =============================================================================
  paaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paaw
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://paaw:paaw@postgres:5432/paaw
      - VALKEY_URL=valkey://valkey:6379
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
      - paaw-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    # Security: minimal permissions
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 1g
    cpus: 2.0

  # =============================================================================
  # PostgreSQL with Apache AGE (Graph Database)
  # =============================================================================
  postgres:
    image: apache/age:latest
    container_name: paaw-postgres
    environment:
      POSTGRES_USER: paaw
      POSTGRES_PASSWORD: paaw
      POSTGRES_DB: paaw
    volumes:
      # PG18+ uses /var/lib/postgresql with subdirs, not /var/lib/postgresql/data
      - paaw-data:/var/lib/postgresql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./scripts/init-graph.sql:/docker-entrypoint-initdb.d/02-init-graph.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paaw -d paaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # Valkey (Redis-compatible) - Cache, Pub/Sub, Task Queue
  # =============================================================================
  valkey:
    image: valkey/valkey:8-alpine
    container_name: paaw-valkey
    ports:
      - "6379:6379"
    volumes:
      - paaw-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: valkey-server --appendonly yes

  # =============================================================================
  # SearXNG - Privacy-respecting meta search engine (no API keys needed!)
  # =============================================================================
  searxng:
    image: searxng/searxng:latest
    container_name: paaw-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  paaw-data:
    name: paaw-postgres-data
  paaw-valkey:
    name: paaw-valkey-data
  paaw-logs:
    name: paaw-logs
