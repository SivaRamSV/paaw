use_default_settings: true

general:
  debug: false
  instance_name: "PAAW Search"

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  limiter: false
  secret_key: "paaw-searxng-secret-key-change-in-production"
  image_proxy: false

ui:
  static_use_hash: true

engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
