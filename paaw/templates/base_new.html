<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: localStorage.getItem('darkMode') !== 'false', currentPage: 'home' }" 
      x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 PAAW - Personal Autonomous Agent Workspace</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Dark theme colors
                        void: {
                            950: '#050507',
                            900: '#09090b',
                            850: '#0c0c0f',
                            800: '#111114',
                            700: '#18181b',
                            600: '#27272a',
                            500: '#3f3f46',
                            400: '#52525b',
                            300: '#71717a',
                        },
                        // Light theme colors
                        light: {
                            50: '#fafafa',
                            100: '#f4f4f5',
                            200: '#e4e4e7',
                            300: '#d4d4d8',
                            400: '#a1a1aa',
                            500: '#71717a',
                            600: '#52525b',
                            700: '#3f3f46',
                            800: '#27272a',
                        },
                        neon: {
                            orange: '#ff9500',
                            amber: '#ffb340',
                            white: '#fafafa',
                            glow: 'rgba(255, 149, 0, 0.4)',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- D3.js for graph -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Custom scrollbar - minimal */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff9500; }
        
        /* Glow effects */
        .glow-orange { box-shadow: 0 0 20px rgba(255, 149, 0, 0.3), 0 0 40px rgba(255, 149, 0, 0.1); }
        .glow-orange-sm { box-shadow: 0 0 10px rgba(255, 149, 0, 0.2); }
        .text-glow { text-shadow: 0 0 10px rgba(255, 149, 0, 0.5); }
        
        /* Glass effect - Dark */
        .dark .glass { 
            background: rgba(17, 17, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Glass effect - Light */
        .glass { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        /* Markdown content styling - Dark */
        .dark .markdown-content h1 { color: #fafafa; }
        .dark .markdown-content h2, .dark .markdown-content h3 { color: #e4e4e7; }
        .dark .markdown-content p, .dark .markdown-content li { color: #a1a1aa; }
        .dark .markdown-content code { background: #18181b; color: #ff9500; }
        .dark .markdown-content pre { background: #0c0c0f; border: 1px solid #27272a; }
        .dark .markdown-content pre code { color: #a1a1aa; }
        .dark .markdown-content strong { color: #fafafa; }
        .dark .markdown-content th { background: #18181b; color: #fafafa; }
        
        /* Markdown content styling - Light */
        .markdown-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #18181b; }
        .markdown-content h2 { font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0 0.5rem; color: #27272a; }
        .markdown-content h3 { font-size: 1.1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #27272a; }
        .markdown-content p { margin: 0.5rem 0; line-height: 1.7; color: #52525b; }
        .markdown-content ul, .markdown-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .markdown-content li { margin: 0.25rem 0; color: #52525b; }
        .markdown-content code { background: #f4f4f5; padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.875rem; color: #ff9500; }
        .markdown-content pre { background: #fafafa; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; border: 1px solid #e4e4e7; }
        .markdown-content pre code { background: none; padding: 0; color: #52525b; }
        .markdown-content strong { color: #18181b; }
        .markdown-content a { color: #ff9500; text-decoration: none; }
        .markdown-content a:hover { text-decoration: underline; }
        .markdown-content blockquote { border-left: 2px solid #ff9500; padding-left: 1rem; margin: 0.5rem 0; color: #71717a; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
        .markdown-content th, .markdown-content td { border: 1px solid #e4e4e7; padding: 0.5rem; text-align: left; }
        .markdown-content th { background: #f4f4f5; color: #18181b; }
        
        /* Animations */
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px rgba(255, 149, 0, 0.5); }
            50% { opacity: 0.7; box-shadow: 0 0 15px rgba(255, 149, 0, 0.8); }
        }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .float { animation: float 3s ease-in-out infinite; }
        
        /* Streaming cursor for chat */
        .streaming-cursor {
            color: #f59e0b;
            font-weight: bold;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* Page transitions */
        .page-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* HTMX loading indicator */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="min-h-screen transition-colors duration-300"
      :class="darkMode ? 'bg-void-950 text-neon-white' : 'bg-light-100 text-light-800'">

    <!-- Navigation Header -->
    <header class="glass sticky top-0 z-50 border-b transition-colors duration-300"
            :class="darkMode ? 'border-void-700/50' : 'border-light-300'">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-neon-orange to-neon-amber flex items-center justify-center glow-orange-sm float">
                        <span class="text-xl">🐾</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-wide">PAAW</h1>
                        <p class="text-[10px] uppercase tracking-widest" :class="darkMode ? 'text-void-400' : 'text-light-500'">Autonomous Agent</p>
                    </div>
                </div>
                
                <!-- Navigation Tabs -->
                <nav class="flex items-center gap-2">
                    <button @click="currentPage = 'home'"
                            :class="currentPage === 'home' ? 'bg-neon-orange text-white glow-orange-sm' : (darkMode ? 'text-void-400 hover:text-neon-white hover:bg-void-700/50' : 'text-light-500 hover:text-light-800 hover:bg-light-200')"
                            class="px-5 py-2.5 rounded-lg font-medium transition-all duration-200 text-sm">
                        Home
                    </button>
                    <a href="/server-room"
                       class="px-5 py-2.5 rounded-lg font-medium transition-all duration-200 text-sm flex items-center gap-2"
                       :class="darkMode ? 'text-void-400 hover:text-neon-white hover:bg-void-700/50' : 'text-light-500 hover:text-light-800 hover:bg-light-200'">
                        <span>🖥️</span> Server Room
                    </a>
                </nav>
                
                <!-- Theme Toggle & Status -->
                <div class="flex items-center gap-3">
                    <!-- Theme Toggle -->
                    <button @click="darkMode = !darkMode" 
                            class="p-2.5 rounded-lg transition-all"
                            :class="darkMode ? 'bg-void-700/50 hover:bg-void-600' : 'bg-light-200 hover:bg-light-300'">
                        <span x-show="darkMode" class="text-lg">☀️</span>
                        <span x-show="!darkMode" class="text-lg">🌙</span>
                    </button>
                    
                    <!-- Status -->
                    <div class="flex items-center gap-2 text-sm px-3 py-1.5 rounded-full"
                         :class="darkMode ? 'bg-void-800/50 border border-void-700/50' : 'bg-light-200 border border-light-300'">
                        <span class="w-2 h-2 rounded-full bg-neon-orange pulse-glow"></span>
                        <span class="text-xs" :class="darkMode ? 'text-void-300' : 'text-light-500'">Live</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Page: Home (Graph + Chat) -->
    <div x-show="currentPage === 'home'" x-transition class="page-enter">
        {% include "pages/home.html" %}
    </div>

    <!-- Global Modal -->
    <div x-data="{ modalOpen: false }" 
         @open-modal.window="modalOpen = true"
         @close-modal.window="modalOpen = false"
         @keydown.escape.window="modalOpen = false">
        
        <!-- Backdrop -->
        <div x-show="modalOpen" 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 z-50"
             :class="darkMode ? 'bg-void-950/80' : 'bg-light-800/50'"
             style="backdrop-filter: blur(8px);"
             @click="modalOpen = false">
        </div>
        
        <!-- Modal Content -->
        <div x-show="modalOpen"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="fixed inset-0 z-50 flex items-center justify-center p-4"
             @click.self="modalOpen = false">
            <div id="modal-content" 
                 class="glass rounded-2xl shadow-2xl max-w-2xl w-full max-h-[85vh] overflow-hidden glow-orange">
                <!-- Content loaded via HTMX -->
            </div>
        </div>
    </div>

    <!-- Chat JavaScript -->
    <script>
        // Markdown renderer configuration
        marked.setOptions({
            breaks: true,
            gfm: true,
        });
        
        // Render markdown in chat messages
        function renderMarkdown(text) {
            return marked.parse(text);
        }
        
        // Scroll chat to bottom
        function scrollChatToBottom() {
            const chatContainer = document.getElementById('chat-messages');
            if (chatContainer) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
        
        // Listen for HTMX events
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'chat-messages') {
                // Render markdown in new messages
                e.detail.target.querySelectorAll('.message-content').forEach(el => {
                    if (!el.dataset.rendered) {
                        el.innerHTML = renderMarkdown(el.textContent);
                        el.dataset.rendered = 'true';
                    }
                });
                scrollChatToBottom();
                
                // Refresh the graph to show any new nodes
                setTimeout(() => {
                    if (window.graphManager && window.graphManager.refresh) {
                        window.graphManager.refresh();
                    }
                }, 500);
            }
        });
    </script>

</body>
</html>
